name: Build stars

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-stars
  cancel-in-progress: false

jobs:
  build:
    # The source repo is meant to be used as a template, not run on its own.
    # Forks and template-derived repos have a different repository name and
    # will pass this guard.
    if: github.repository != 'Metalhearf/awesome-stars'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Rebuild catalog
        env:
          STARS_TOKEN: ${{ secrets.STARS_TOKEN }}
        run: python .github/scripts/generate_stars.py

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: rebuild stars catalog"
          git push
