name: Build stars

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-stars
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Skip on template repositories
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$(gh api repos/${{ github.repository }} --jq '.is_template')" = "true" ]; then
            echo "is_template=true — this repo is the template, nothing to build."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - name: Rebuild catalog
        if: env.SKIP != '1'
        env:
          STARS_TOKEN: ${{ secrets.STARS_TOKEN }}
        run: python .github/scripts/generate_stars.py

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: rebuild stars catalog"
          git push
