# Example workflow for your username/username profile repo.
#
# Drop this at .github/workflows/sync-stars.yaml in your profile repo, then
# add empty marker tags somewhere in your profile README.md:
#
#     <!-- STARS:START -->
#     <!-- STARS:END -->
#
# The workflow fetches the rendered block from your stars repo and pastes it
# in. No PAT needed; the source repo is public.
#
# Edit STARS_SOURCE below to point at the repo where your awesome-stars
# instance lives.

name: Sync stars

on:
  schedule:
    - cron: '30 6 * * *'  # 30 minutes after the upstream build
  workflow_dispatch:

env:
  STARS_SOURCE: ${{ github.repository_owner }}/stars

permissions:
  contents: write

concurrency:
  group: sync-stars
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch upstream catalog
        run: curl -fsSL -o /tmp/upstream.md "https://raw.githubusercontent.com/${STARS_SOURCE}/main/README.md"

      - name: Replace marker block in profile README
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          START = "<!-- STARS:START -->"
          END = "<!-- STARS:END -->"
          pattern = re.compile(re.escape(START) + r".*?" + re.escape(END), re.DOTALL)

          def last_block(text, label):
              matches = list(pattern.finditer(text))
              if not matches:
                  raise SystemExit(f"Markers not found in {label}")
              return matches[-1]

          src = Path("/tmp/upstream.md").read_text()
          dst_path = Path("README.md")
          dst = dst_path.read_text()
          block = last_block(src, "upstream README").group(0)
          target = last_block(dst, "profile README")
          dst_path.write_text(dst[:target.start()] + block + dst[target.end():])
          PY

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: sync stars catalog"
          git push
